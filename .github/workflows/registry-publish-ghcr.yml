name: Build and Deploy OCI Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  registry_publish_workflow_ghcr:
    uses: turbot/steampipe-workflows/.github/workflows/registry-publish-ghcr-large-runners.yml@main
    secrets: inherit
    with:
      releaseTimeout: 60m
